# SonarCloud Project Configuration for Bausteinsicht (Go project)

# Project Identification
sonar.projectKey=docToolchain_Bausteinsicht
sonar.projectName=Bausteinsicht
sonar.organization=doctoolchain
sonar.host.url=https://sonarcloud.io

# Source Code
sonar.sources=.
sonar.inclusions=**/*.go
sonar.test.inclusions=**/*_test.go

# Go Coverage
# coverage.out is generated by: go test -coverprofile=coverage.out ./...
sonar.go.coverage.reportPaths=coverage.out

# Coverage exclusions
# - *_test.go and testdata: test infrastructure, not product code
# - cmd/**/*.go: CLI wiring (Cobra setup); low business-logic density
# - *_windows.go, *_darwin.go: platform shims; hard to cover on Linux CI
# NOTE: do NOT expand this list for internal/* packages — that hides real gaps.
# See: Quality Gate Override Policy in CLAUDE.md for approved workarounds.
sonar.coverage.exclusions=**/*_test.go,**/testdata/**,cmd/**/*.go,**/*_windows.go,**/*_darwin.go

# Duplication exclusions
sonar.cpd.exclusions=**/*_test.go

# Quality Gate
# New-code-coverage threshold is set to 65% in the SonarCloud UI quality gate.
# "Verified behavior-preserving refactors" may be admin-merged if the gate
# trips on legacy untested lines — see override policy in CLAUDE.md.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Branch / PR Analysis
sonar.pullrequest.github.repository=docToolchain/Bausteinsicht
sonar.pullrequest.provider=GitHub
