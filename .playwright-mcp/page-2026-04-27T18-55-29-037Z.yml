      - generic [ref=e33]:
        - generic [ref=e36]:
          - heading "🔄 Bidirectional Sync" [level=4] [ref=e37]
          - paragraph [ref=e38]: Edit in draw.io or in the JSON model — changes sync both ways. No more "which diagram is the latest version?" questions. Your model stays in sync with your diagrams automatically.
        - generic [ref=e41]:
          - heading "🎨 draw.io as Frontend" [level=4] [ref=e42]
          - paragraph [ref=e43]: No proprietary viewer needed. Use the tool everyone already knows. Full control over styling via draw.io templates. Your diagrams look exactly the way you want them.
        - generic [ref=e46]:
          - heading "🤖 LLM-Friendly" [level=4] [ref=e47]
          - paragraph [ref=e48]: JSON model format that LLMs read and write natively. CLI commands let AI agents modify your architecture. IDE autocompletion via JSON Schema — no plugin needed.
        - generic [ref=e51]:
          - heading "🛠 Flexible Hierarchy" [level=4] [ref=e52]
          - paragraph [ref=e53]: Not limited to 4 C4 levels. Define your own element kinds. Components of components? No problem. Your architecture, your rules.
