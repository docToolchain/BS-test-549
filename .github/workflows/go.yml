name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    outputs:
      test-pass-rate: ${{ steps.report.outputs.pass-rate }}
      coverage: ${{ steps.report.outputs.coverage }}
      performance-change: ${{ steps.report.outputs.performance-change }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - name: Run tests with coverage
        id: test
        # continue-on-error so the report still generates and uploads below;
        # the job is failed explicitly in the final step if tests did not pass.
        continue-on-error: true
        shell: bash
        run: go test ./... -json -covermode=atomic -coverprofile=coverage.out > test-results.json
      - name: Check coverage file
        shell: bash
        run: |
          if [ -f coverage.out ]; then
            echo "✓ coverage.out exists"
            wc -l coverage.out
            echo "First 10 lines:"
            head -10 coverage.out
          else
            echo "✗ coverage.out not found"
          fi
      - name: Check source files
        shell: bash
        run: |
          echo "Checking if source files are readable..."
          _n=0
          while IFS= read -r f && [ "$_n" -lt 5 ]; do
            _n=$((_n+1))
            if [ -f "$f" ]; then
              echo "✓ $f ($(wc -l < "$f") lines)"
            else
              echo "✗ $f not found"
            fi
          done < <(find internal -name "*.go" -type f)
      - name: Generate test report
        id: report
        shell: bash
        run: |
          GOEXE=$(go env GOEXE)
          cd scripts/test-report-generator
          go build -o test-report-generator${GOEXE} .
          cd ../..

          # Determine OS key from matrix.os
          OS_NAME=${{ matrix.os }}
          OS_KEY="${OS_NAME%%-*}"

          if [ -f test-results.json ]; then
            echo "Generating reports for ${OS_KEY} from test-results.json"
            # Only pass coverage.out if it exists (it may not exist on failed runs or Windows)
            if [ -f coverage.out ]; then
              ./scripts/test-report-generator/test-report-generator${GOEXE} -coverage=coverage.out -format=json < test-results.json > test-report-${OS_KEY}.json
            else
              echo "Warning: coverage.out not found, generating report without coverage data"
              ./scripts/test-report-generator/test-report-generator${GOEXE} -format=json < test-results.json > test-report-${OS_KEY}.json
            fi
          else
            echo "test-results.json not found!"
            exit 1
          fi
        continue-on-error: true
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            test-report-*.json
            test-results.json
            coverage.out
          retention-days: 30
      - name: Fail job if tests failed
        if: always()
        shell: bash
        env:
          TEST_OUTCOME: ${{ steps.test.outcome }}
        run: |
          if [ "$TEST_OUTCOME" != "success" ]; then
            echo "::error::Go tests failed — see the 'Run tests with coverage' step and the uploaded test report."
            exit 1
          fi

  merge-reports:
    needs: build-and-test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          merge-multiple: true
      - name: Build test-report-generator
        run: |
          cd scripts/test-report-generator
          go build -o test-report-generator .
      - name: Merge reports into combined HTML
        continue-on-error: true
        run: |
          ./scripts/test-report-generator/test-report-generator \
            -merge \
            -report-linux=test-report-ubuntu.json \
            -report-windows=test-report-windows.json \
            -report-macos=test-report-macos.json \
            > test-report-combined.html
      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-combined
          path: test-report-combined.html
          retention-days: 90

  report-pr-comment:
    # always() so the report still posts even when build-and-test fails the
    # job on a test failure (the artifacts are uploaded before that happens).
    if: always() && github.event_name == 'pull_request'
    needs: [build-and-test, merge-reports]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          merge-multiple: true
      - name: Post test report comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Load all three reports
            const linux = JSON.parse(fs.readFileSync('test-report-ubuntu.json', 'utf8'));
            const windows = JSON.parse(fs.readFileSync('test-report-windows.json', 'utf8'));
            const macos = JSON.parse(fs.readFileSync('test-report-macos.json', 'utf8'));

            function getMetrics(report) {
              const coverages = Object.values(report.coverage || {});
              let totalStmt = 0, coveredStmt = 0;
              coverages.forEach(pkg => {
                totalStmt += pkg.stmt_total;
                coveredStmt += pkg.stmt_covered;
              });
              const coverage = totalStmt > 0 ? (coveredStmt / totalStmt * 100).toFixed(1) : 'N/A';
              return {
                tests: report.tests.total,
                passed: report.tests.passed,
                failed: report.tests.failed,
                passRate: report.tests.pass_rate.toFixed(1),
                coverage: coverage,
                duration: report.tests.total_time_seconds.toFixed(2)
              };
            }

            const linuxMetrics = getMetrics(linux);
            const windowsMetrics = getMetrics(windows);
            const macosMetrics = getMetrics(macos);

            // Generate Markdown report with multi-OS comparison
            let markdown = '## 📊 Test Report (Multi-OS)\n\n';
            markdown += '| Metric | 🐧 Linux | 🪟 Windows | 🍎 macOS |\n';
            markdown += '|--------|----------|-----------|--------|\n';
            markdown += `| Total Tests | ${linuxMetrics.tests} | ${windowsMetrics.tests} | ${macosMetrics.tests} |\n`;
            markdown += `| ✅ Passed | ${linuxMetrics.passed} (${linuxMetrics.passRate}%) | ${windowsMetrics.passed} (${windowsMetrics.passRate}%) | ${macosMetrics.passed} (${macosMetrics.passRate}%) |\n`;
            markdown += `| ❌ Failed | ${linuxMetrics.failed} | ${windowsMetrics.failed} | ${macosMetrics.failed} |\n`;
            markdown += `| ⏱️ Duration | ${linuxMetrics.duration}s | ${windowsMetrics.duration}s | ${macosMetrics.duration}s |\n`;
            markdown += `| 📦 Coverage | ${linuxMetrics.coverage}% | ${windowsMetrics.coverage}% | ${macosMetrics.coverage}% |\n\n`;
            markdown += '💡 Full report: Download artifacts from this workflow run.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: markdown
            });

  coverage-report:
    name: Coverage Report (unit vs. E2E)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Generate side-by-side unit vs. E2E coverage report
        run: |
          chmod +x scripts/coverage-report.sh
          scripts/coverage-report.sh > coverage-report.md
        continue-on-error: true
      - name: Append to job summary
        if: always()
        run: |
          if [ -f coverage-report.md ]; then
            cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ coverage-report.md was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-unit-vs-e2e
          path: coverage-report.md
          retention-days: 30
      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage-report.md')) return;
            const body = fs.readFileSync('coverage-report.md', 'utf8');
            const marker = '<!-- bsx-coverage-report-unit-vs-e2e -->';
            const fullBody = marker + '\n' + body;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  e2e-plan-report:
    name: E2E Test Plan Report (line-accurate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Generate line-accurate E2E-Test-Plan.adoc report
        # Artifact + PR comment only — this does NOT commit
        # src/docs/e2e-test-report-<date>.adoc to main. Per #519, that's a
        # separate, deliberate decision left for later.
        run: |
          chmod +x scripts/e2e-test-report.sh
          scripts/e2e-test-report.sh > e2e-test-report.adoc
        continue-on-error: true
      - name: Append to job summary
        if: always()
        run: |
          if [ -f e2e-test-report.adoc ]; then
            {
              echo '```asciidoc'
              cat e2e-test-report.adoc
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ e2e-test-report.adoc was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-plan-report
          path: e2e-test-report.adoc
          retention-days: 30
      - name: Post or update PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('e2e-test-report.adoc')) return;
            const body = fs.readFileSync('e2e-test-report.adoc', 'utf8');
            const marker = '<!-- bsx-e2e-plan-report -->';
            const fullBody = marker + '\n## 🧪 E2E Test Plan Report (generated)\n\n'
              + '<details><summary>Per-line PASS/FAIL/SKIP (click to expand)</summary>\n\n'
              + '```asciidoc\n' + body + '\n```\n\n</details>\n\n'
              + '💡 `SKIP: not automated` means no `e2e/*_test.go` test is mapped to that line yet — see `internal/e2eplan` and `E2E-Test-Plan.adoc`\'s "Generating a Line-Accurate Report Automatically" section.';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          go test -coverprofile=coverage/coverage.out ./... || true
          go tool cover -html=coverage/coverage.out -o coverage/coverage.html
      - name: Calculate coverage percentage
        id: coverage
        run: |
          if [ -f coverage/coverage.out ]; then
            COVERAGE=$(go tool cover -func=coverage/coverage.out | grep total | awk '{print $NF}')
            echo "percentage=${COVERAGE}" >> $GITHUB_OUTPUT
            echo "📊 Code Coverage: ${COVERAGE}"
          fi
      - name: Create coverage markdown summary
        if: always()
        run: |
          if [ ! -f coverage/coverage.out ]; then
            exit 0
          fi

          go tool cover -func=coverage/coverage.out > coverage/coverage.txt

          # Create markdown report
          {
            echo "# 📊 Code Coverage Report"
            echo ""
            echo "## Summary"
            echo ""
            COVERAGE=$(grep total coverage/coverage.txt | awk '{print $NF}')
            echo "**Overall Coverage:** \`${COVERAGE}\`"
            echo ""
            echo "## Coverage by Package"
            echo ""
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            grep -v total coverage/coverage.txt | sort -k1 | awk '{printf "| %s | %s |\n", $1, $3}' | sed 's|github.com/docToolchain/Bausteinsicht/||g'
            echo ""
            echo "_Generated by GitHub Actions CI_"
          } > coverage/COVERAGE.md

          # Append to job summary for visibility in workflow run
          cat coverage/COVERAGE.md >> $GITHUB_STEP_SUMMARY
      - name: Upload coverage report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: false

  schema-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: make schema-validate

  # Verifies src/docs/arc42/architecture.jsonc (the self-hosted architecture
  # model) hasn't drifted from the real internal/ and cmd/ package
  # structure — the class of gap found and fixed in #524/#526. No draw.io
  # CLI needed (unlike `make arc42-docs`): this only reads the model via
  # `export-table --format json`, no headless export.
  arc42-drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: make arc42-drift-check

  # Verifies every *-components view in architecture.jsonc has a matching
  # "Level 2" section in chapter 5 — the class of gap deferred in #526 and
  # closed in #539. Same shape as arc42-drift-check above (structural, no
  # draw.io needed), added because #541's review pointed out that leaving
  # this CI-less (only reachable via /doc-check) risks the same silent-
  # drift failure mode #524/#526 already demonstrated for arc42-drift-check
  # itself.
  arc42-level2-coverage-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: make arc42-level2-coverage-check

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6
        with:
          version: latest

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        shell: bash
        run: |
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted. Run: gofmt -w ."
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are gofmt-clean."

  # internal/importer/xmi/testdata/BigData.xmi (a real ~118MB Enterprise
  # Architect/AUTOSAR export) is fetched from the separate
  # docToolchain/Bausteinsicht-Testdata repo rather than committed/Git-LFS-
  # tracked here (#553) — the repo was previously paying Git LFS's
  # complexity/quota cost without CI ever actually exercising the real-file
  # integration test (no `actions/checkout` step anywhere set `lfs: true`,
  # so every CI checkout only ever saw the ~130-byte LFS pointer, and
  # TestImport_BigData's own >1MB presence check silently skipped it in
  # every run). This dedicated job fetches the real fixture and explicitly
  # fails if the test unexpectedly skips, so that class of silent drift
  # can't recur unnoticed. Isolated from build-and-test/test-race/coverage
  # so the ~118MB download only happens once, in one job, not multiplied
  # across the OS matrix or every test-running job.
  #
  # TestImport_SyntheticBigData (same package) complements this: it exercises
  # the importer at the same rough scale/depth via a generated fixture, with
  # no fetch dependency, so every other job still gets baseline scale
  # coverage even if this job's fetch ever fails or the fixture repo is down.
  xmi-bigdata-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - run: make fetch-testdata
      - name: go test -run TestImport_BigData (must not skip)
        shell: bash
        run: |
          # GitHub Actions runs bash steps with `-e` by default, which would
          # abort this script at the `OUTPUT=$(...)` line (before printing
          # anything) if `go test` itself fails outright — masking the very
          # diagnostics this step exists to surface. Disable it around the
          # capture so a real test failure's full -v output reaches the log.
          set +e
          OUTPUT=$(go test -run TestImport_BigData -v ./internal/importer/xmi/... 2>&1)
          CODE=$?
          set -e
          echo "$OUTPUT"
          if [ "$CODE" -ne 0 ]; then
            echo "::error::TestImport_BigData failed (exit $CODE) — see output above."
            exit 1
          fi
          if echo "$OUTPUT" | grep -q -- '--- SKIP'; then
            echo "::error::TestImport_BigData was skipped — the BigData.xmi fetch likely failed silently."
            exit 1
          fi
