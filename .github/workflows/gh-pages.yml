name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      DTC_HEADLESS: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup dtcw
        run: chmod +x dtcw

      - name: Generate Site
        run: ./dtcw generateSite

      # Include the latest multi-OS test report as a subdirectory of the site.
      # GitHub Pages (build_type: workflow) hosts exactly one deployment, so the
      # report must ship inside the same artifact as the documentation — a
      # separate deploy workflow would replace the whole site (see issue history).
      - name: Download test report artifact
        uses: dawidd6/action-download-artifact@09f2f74827fd3a8607589e5ad7f9398816f540fe # v3
        with:
          workflow: go.yml
          workflow_conclusion: success
          branch: main
          name: test-report-combined
          path: build/microsite/output/test-reports/
        continue-on-error: true

      - name: Create test reports index
        run: |
          if [ -d build/microsite/output/test-reports ]; then
            cat > build/microsite/output/test-reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Test Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 20px; background: #f5f5f5; }
              .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              h1 { color: #333; margin-top: 0; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .latest { background: #f6f8fa; padding: 20px; border-radius: 6px; margin: 20px 0; border-left: 4px solid #0366d6; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📊 Multi-OS Test Reports</h1>
              <p>Latest test reports from the Bausteinsicht CI pipeline.</p>
              <div class="latest">
                <h2>Latest Report</h2>
                <p><a href="test-report-combined.html">📊 View Multi-OS Test Report</a></p>
                <p style="color: #666; font-size: 0.9em;">Shows cross-platform comparison of test results and coverage across Linux, Windows, and macOS.</p>
              </div>
            </div>
          </body>
          </html>
          EOF
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./build/microsite/output

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
