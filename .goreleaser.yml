version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/bausteinsicht
    binary: bausteinsicht
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

sboms:
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cyclonedx.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

changelog:
  use: github
  sort: asc
  groups:
    - title: "New Features"
      regexp: '^feat'
    - title: "Bug Fixes"
      regexp: '^fix'
    - title: "Security"
      regexp: '^security'
    - title: "Performance"
      regexp: '^perf'
    - title: "Refactoring"
      regexp: '^refactor'
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - "^test:"
      - "^Merge pull request"
      - "^trigger CI"
